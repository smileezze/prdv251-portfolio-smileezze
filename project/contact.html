<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Jordan Hayes</title>
    <link rel="stylesheet" href="assets/css/style.css">
  </head>
  <body>
    <header>
      <nav aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <h1>Want to Connect?</h1>
    </header>
    <main>
      <section>
        <h2>Contact</h2>
        <p>The best ways to reach me:</p>
        <ul>
          <li>Email: <a href="mailto:you@example.com">you@example.com</a></li>
          <li>LinkedIn: <a href="https://www.linkedin.com/in/your-profile">Your Profile</a></li>
          <li>GitHub: <a href="https://github.com/your-username">@your-username</a></li>
        </ul>
        <h3>Send Me a Message</h3>
        <p>You can also use the form below:</p>
        <form action="#" method="post">
          <div>
            <label for="name">Name</label><br>
            <input id="name" name="name" type="text">
          </div>
          <div>
            <label for="email">Email</label><br>
            <input id="email" name="email" type="email">
          </div>
          <div>
            <label for="message">Message</label><br>
            <textarea id="message" name="message" rows="5"></textarea>
          </div>
          <button type="submit">Send</button>
        </form>
      </section>
    </main>
    <footer>
      <p>© <span id="year"></span>Jordan Hayes</p>
    </footer>
  </body>
</html>
